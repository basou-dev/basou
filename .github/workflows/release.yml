name: Release

# vX.Y.Z tag push triggers the full release. workflow_dispatch only
# permits dry-runs so that the OIDC handshake can be smoke-tested
# without publishing.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip the actual publish / release-create. Use to smoke-test the workflow on a non-tag run.'
        type: boolean
        default: true

# Minimum-required default; each job tightens or expands as needed
# (supply-chain hardening).
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  # ==========================================================
  # 1. verify — confirm the tagged tree is typecheck / lint /
  #    test green before any publish step runs.
  # ==========================================================
  verify:
    name: Verify (typecheck / lint / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # `.nvmrc` is pinned to Node 24, which ships npm v11.5+ —
          # required for OIDC trusted publishing.
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build all workspace packages
        run: pnpm -r run build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Lint
        run: pnpm run lint
      - name: Test
        run: pnpm -r --if-present test

  # ==========================================================
  # 2. publish-npm — publish each package through npm's OIDC
  #    trusted publisher path, with SLSA provenance v1 attestation.
  # ==========================================================
  publish-npm:
    name: Publish ${{ matrix.pkg }} to npm
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required so the runner can fetch an OIDC token to exchange
      # with the npm registry and Sigstore Fulcio.
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: '@basou/core'
            dir: core
          - pkg: '@basou/cli'
            dir: cli
          - pkg: '@basou/sdk'
            dir: sdk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      # `registry-url` is intentionally omitted: when it is set,
      # `actions/setup-node` writes a `_authToken=${NODE_AUTH_TOKEN}`
      # line into ~/.npmrc that the npm CLI then sends as an empty
      # bearer token, bypassing the OIDC trusted-publisher path and
      # producing a 404. The separate step below rewrites ~/.npmrc to
      # contain only the registry line.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Configure npm registry without a token line (so OIDC takes over)
        run: |
          echo "registry=https://registry.npmjs.org/" > ~/.npmrc
          cat ~/.npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all workspace packages so workspace:* refs resolve
        run: pnpm -r run build

      - name: pnpm pack + npm publish (provenance via OIDC)
        working-directory: packages/${{ matrix.dir }}
        run: |
          # Real publish runs only on tag push. workflow_dispatch
          # always exercises the dry-run branch — the dry_run input
          # is informational only.
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            echo "Publishing ${{ matrix.pkg }} via npm CLI (pnpm pack handles the workspace:* rewrite)"
            pnpm pack
            TGZ=$(ls *.tgz | head -1)
            echo "Packed tarball: $TGZ"
            npm publish "$TGZ" --access public --provenance
          else
            echo "Dry-run mode (event=$GITHUB_EVENT_NAME, dry_run=${{ inputs.dry_run }}): pnpm publish --dry-run for ${{ matrix.pkg }}"
            pnpm publish --access public --provenance --no-git-checks --dry-run
          fi

  # ==========================================================
  # 3. github-release — attach pnpm-packed tarballs plus cosign
  #    sign-blob bundles as release assets, with auto-generated
  #    release notes.
  # ==========================================================
  github-release:
    name: Create GitHub Release with signed npm tarballs
    needs: [publish-npm]
    if: ${{ inputs.dry_run != true && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build all workspace packages
        run: pnpm -r run build
      - name: Pack tarballs (using pnpm to rewrite workspace:*, matching publish-npm)
        run: |
          mkdir -p artifacts
          for d in core cli sdk; do
            (cd "packages/$d" && pnpm pack --pack-destination ../../artifacts)
          done
          ls -la artifacts/
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign each tarball with cosign sign-blob
        run: |
          for f in artifacts/*.tgz; do
            cosign sign-blob --yes --bundle "$f.bundle" "$f"
          done
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: Basou ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.tgz
            artifacts/*.bundle

  # ==========================================================
  # 4. update-docs-site — after the npm packages publish, open a pull
  #    request on the basou-site repo that bumps its pinned @basou/core,
  #    @basou/cli, and @basou/sdk dependencies to this release and
  #    regenerates the version-coupled docs
  #    (the install-page and landing-page version) from the freshly
  #    published package. basou-site's own review/merge gate and Cloudflare
  #    deploy take it from there.
  #
  #    Cross-repo writes use a short-lived GitHub App token scoped to
  #    basou-site only (Contents + Pull requests). The job is a clean no-op
  #    unless those App credentials are present, so this pipeline is safe to
  #    run before the App is provisioned. Like the publish / release jobs it
  #    runs only on a real tag-push publish, never on a workflow_dispatch
  #    dry-run.
  # ==========================================================
  update-docs-site:
    name: Open basou-site docs bump PR
    needs: [publish-npm]
    if: ${{ inputs.dry_run != true && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    # The npm publish already succeeded by the time this runs; a failure to
    # open the docs bump PR is recoverable and must not mark the release run
    # as failed.
    continue-on-error: true
    permissions:
      # This job writes nothing to this repo; the cross-repo pull request is
      # opened with the GitHub App token minted below.
      contents: read
    steps:
      - name: Check for the docs-site bump App credentials
        id: guard
        env:
          APP_ID: ${{ secrets.SITE_BUMP_APP_ID }}
          PRIVATE_KEY: ${{ secrets.SITE_BUMP_APP_PRIVATE_KEY }}
        run: |
          if [ -n "$APP_ID" ] && [ -n "$PRIVATE_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SITE_BUMP_APP_ID / SITE_BUMP_APP_PRIVATE_KEY are not both set; skipping the basou-site docs bump. Provision the GitHub App to enable it."
          fi

      - name: Mint a GitHub App token scoped to basou-site
        id: app-token
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SITE_BUMP_APP_ID }}
          private-key: ${{ secrets.SITE_BUMP_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: basou-site
          # Narrow the minted token to exactly what opening the PR needs, so
          # it fails closed even if the App is ever granted more.
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout basou-site
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          repository: ${{ github.repository_owner }}/basou-site
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          # create-pull-request handles commit + push with the token it is
          # given, so the checkout itself must not leave the App token
          # persisted in the local git config.
          persist-credentials: false
          path: basou-site

      - name: Install pnpm
        if: steps.guard.outputs.enabled == 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          # basou-site is checked out into a subdirectory, so point the action
          # at its package.json to read the pinned pnpm version (there is no
          # package.json at the workspace root in this job).
          package_json_file: basou-site/package.json

      - name: Setup Node.js
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: basou-site/.nvmrc

      - name: Bump @basou/core + @basou/cli + @basou/sdk and regenerate docs
        id: bump
        if: steps.guard.outputs.enabled == 'true'
        working-directory: basou-site
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"
          if [ ! -f scripts/gen-docs.mjs ]; then
            echo "::notice::basou-site has no scripts/gen-docs.mjs on main yet; skipping until the docs generator is merged."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Pin exactly to the version just published by the jobs above. npm
          # may need a moment to propagate the new version, so retry briefly.
          for attempt in 1 2 3 4 5; do
            if pnpm add -E "@basou/core@${version}" "@basou/cli@${version}" "@basou/sdk@${version}"; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::@basou/core@${version} / @basou/cli@${version} / @basou/sdk@${version} are not installable after retries."
              exit 1
            fi
            echo "Attempt ${attempt} failed; waiting for npm to propagate @basou/core@${version} / @basou/cli@${version} / @basou/sdk@${version}..."
            sleep 15
          done
          pnpm gen:docs
          # Decide on a bump using only the paths the PR will actually stage.
          if git diff --quiet -- package.json pnpm-lock.yaml src/content/docs public/schemas; then
            echo "::notice::basou-site is already at @basou/core + @basou/cli + @basou/sdk @${version}; nothing to bump."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
          fi
          # Surface anything generated outside the committed allowlist so it is
          # not silently dropped from the PR.
          if ! git diff --quiet -- . ':!package.json' ':!pnpm-lock.yaml' ':!src/content/docs' ':!public/schemas'; then
            echo "::warning::Changes outside the docs allowlist were produced; they will not be included in the PR."
          fi

      - name: Open the bump pull request
        if: steps.guard.outputs.enabled == 'true' && steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: basou-site
          base: main
          branch: bump/basou-${{ steps.bump.outputs.version }}
          delete-branch: true
          # Stage exactly what `pnpm gen:docs` regenerates: the version-coupled
          # mdx under src/content/docs and the verbatim JSON Schema artifacts
          # under public/schemas (served at basou.dev/schemas/). Both move
          # together with a release, so both must be staged or basou-site's
          # gen:docs:check fails on the drifted, unstaged schemas.
          add-paths: |
            package.json
            pnpm-lock.yaml
            src/content/docs/**
            public/schemas/**
          commit-message: 'chore(deps): bump @basou/core + @basou/cli + @basou/sdk to ${{ steps.bump.outputs.version }} and regenerate docs'
          title: 'chore(deps): bump @basou/core + @basou/cli + @basou/sdk to ${{ steps.bump.outputs.version }} and regenerate docs'
          body: |
            Automated by the basou release pipeline after publishing `${{ github.ref_name }}`.

            - Bumps the pinned `@basou/core`, `@basou/cli`, and `@basou/sdk` dependencies to `${{ steps.bump.outputs.version }}`.
            - Regenerates the version-coupled docs regions and the CLI command reference with `pnpm gen:docs`.

            Review the regenerated docs in the diff, then merge to deploy.
